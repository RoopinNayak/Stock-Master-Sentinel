<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockMaster Sentinel Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at top, #0f172a, #020617); color: #e2e8f0; }
        .card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="card w-full max-w-2xl rounded-3xl p-10 shadow-2xl ring-1 ring-slate-700/60">
        <div class="mb-8">
            <h1 class="text-3xl font-bold neon-cyan">Store Owner Onboarding</h1>
            <p class="mt-3 text-slate-400">Set up your store identity and alert channel before launching the dashboard.</p>
        </div>

        <div class="grid gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-300">Store Name</label>
                <input id="storeName" type="text" placeholder="Roopin's Coffee Shop" class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-cyan-400 focus:outline-none" />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300">Owner Name</label>
                <input id="ownerName" type="text" placeholder="Roopin" class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-cyan-400 focus:outline-none" />
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300">Communication Channel</label>
                <select id="channel" class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-cyan-400 focus:outline-none">
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Discord">Discord</option>
                    <option value="Telegram">Telegram</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-300">Channel ID / Webhook</label>
                <input id="channelId" type="text" placeholder="+1234567890, Discord webhook, or Telegram chat ID" class="mt-2 w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 focus:border-cyan-400 focus:outline-none" />
            </div>
            <div class="flex items-center justify-between gap-4">
                <button onclick="saveSettings()" class="rounded-2xl bg-cyan-500 px-6 py-3 text-sm font-semibold text-slate-900 hover:bg-cyan-400 transition">Save & Launch</button>
                <span id="statusMessage" class="text-sm text-slate-400"></span>
            </div>
        </div>
    </div>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1500830410337292388/LPXVPpo8LZdPwqrJ2H9Cx4hLkvZxZ-T8Udj9hdAs8hJl2L2lrSpbqDRWS33oTiVD8KTO';
        const channelSelect = document.getElementById('channel');
        const channelIdInput = document.getElementById('channelId');

        channelSelect.addEventListener('change', () => {
            if (channelSelect.value === 'Discord') {
                channelIdInput.value = DISCORD_WEBHOOK_URL;
            } else if (channelSelect.value === 'Telegram') {
                channelIdInput.placeholder = 'Telegram chat ID, e.g. 123456789';
                channelIdInput.value = '';
            } else {
                channelIdInput.placeholder = '+1234567890, Discord webhook, or Telegram chat ID';
            }
        });

        async function saveSettings() {
            const storeName = document.getElementById('storeName').value.trim();
            const ownerName = document.getElementById('ownerName').value.trim();
            const channel = channelSelect.value;
            const channelId = channelIdInput.value.trim();

            const status = document.getElementById('statusMessage');
            if (!storeName || !ownerName || !channelId) {
                status.textContent = 'Please complete all fields.';
                status.className = 'text-sm text-red-300';
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ storeName, ownerName, channel, channelId })
                });
                if (!response.ok) {
                    status.textContent = 'Unable to save settings. Check backend.';
                    status.className = 'text-sm text-red-300';
                    return;
                }
                status.textContent = 'Settings saved. Redirecting to dashboard...';
                status.className = 'text-sm text-green-300';
                localStorage.setItem("ownerLoggedIn", "true");
                setTimeout(() => window.location.href = 'index.html', 900);
            } catch (error) {
                status.textContent = 'Network error. Is backend running?';
                status.className = 'text-sm text-red-300';
                console.error(error);
            }
        }
    </script>
</body>
</html>
